<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casamento Luiz Philipe & Roberta</title>

<style>

body{
font-family: Arial;
background:#f3f3f3;
text-align:center;
margin:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding-bottom:40px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
border-radius:12px;
overflow:hidden;
}

img{
width:100%;
}

h2{
color:#8c6b2f;
margin-top:20px;
}

.botoes{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
padding:20px;
}

.botao{
background:white;
border:2px solid #caa64b;
border-radius:30px;
padding:12px;
font-size:16px;
font-weight:bold;
color:#8c6b2f;
text-decoration:none;
cursor:pointer;
width:80%;
max-width:250px;
transition:0.3s;
}

.botao:hover{
background:#caa64b;
color:white;
}

.contador{
font-size:22px;
margin:20px;
color:#444;
font-weight:bold;
}

input{
padding:10px;
border-radius:25px;
border:1px solid #ccc;
width:80%;
max-width:250px;
text-align:center;
}

.footer{
margin-top:20px;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<img src="https://i.imgur.com/bdwZYb3.jpeg">

<h2>21 de Março de 2026 • 17:30</h2>

<div class="contador" id="contador"></div>

<div class="botoes">

<a class="botao" target="_blank"
href="https://www.google.com/maps/place/Estr.+Francisco+da+Cruz+Nunes,+5260+-+Piratininga,+Niter%C3%B3i+-+RJ">
📍 Ver Local
</a>

<input id="nome" placeholder="Digite seu nome">

<button class="botao" onclick="confirmar()">
✅ Confirmar Presença
</button>

</div>

<div class="footer">
Esperamos você nesse dia tão especial 💛
</div>

</div>

<script>

function confirmar(){

var nome = document.getElementById("nome").value;

if(nome==""){
alert("Digite seu nome primeiro");
return;
}

var mensagem = "Olá! Meu nome é "+nome+" e estou confirmando presença no casamento de Luiz Philipe e Roberta.";

var url = "https://wa.me/5521982521559?text="+encodeURIComponent(mensagem);

window.open(url);

}

var dataCasamento = new Date("Mar 21, 2026 17:30:00").getTime();

var x = setInterval(function(){

var agora = new Date().getTime();

var distancia = dataCasamento - agora;

var dias = Math.floor(distancia / (1000*60*60*24));
var horas = Math.floor((distancia % (1000*60*60*24))/(1000*60*60));
var minutos = Math.floor((distancia % (1000*60*60))/(1000*60));

document.getElementById("contador").innerHTML =
"Faltam "+dias+" dias "+horas+"h "+minutos+"min";

},1000);

</script>

</body>
</html>
